name: book_scanner
description: "Book Scanner - Scan and print books with ease"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Device Communication
  flutter_blue_plus: ^1.34.5
  permission_handler: ^11.3.1

  # Camera & Image
  image_picker: ^1.1.2

  # Storage & Preferences
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4

  # Networking
  dio: ^5.4.1
  web_socket_channel: ^3.0.2

  # UI Enhancements
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  animations: ^2.0.11
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.2

flutter:
  uses-material-design: true
